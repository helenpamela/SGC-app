<!DOCTYPE html>
<html>

<head>
  <title>Upcoming Events</title>

  <link rel="stylesheet" href="header-styles.css">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      margin: 0;
      background: #f6f3f9;
    }

    .container {
      width: 100%;
      max-width: 800px;
      margin: 30px auto;
      background: #ffffff;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      color: #5c4b7d;
    }

    body {
      background: linear-gradient(180deg, #f6f3f9, #ffffff);
    }

    .card {
      padding: 15px;
      border-radius: 12px;
      background: #ffffff;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    .button {
      display: block;
      margin: 20px auto;
      padding: 10px 14px;
      background: #e6d9f5;
      border: none;
      border-radius: 10px;
      cursor: pointer;

    }

    .button:hover {
      background: #d6c6f0;
      box-shadow: 0 0 10px rgba(180, 150, 255, 0.4);
    }

    .home-button {
      display: inline-block;
      margin-bottom: 20px;
      padding: 12px 20px;
      font-size: 16px;
      background: #dcd0f0;
      border-radius: 10px;
      text-decoration: none;
      color: #5c4b7d;
    }

    img {
      width: 120px;
      margin-bottom: 10px;
    }

    .event-row {
      display: flex;
      gap: 15px;
      align-items: flex-start;
      margin-bottom: 15px;
    }

    .event-row strong {
      font-size: 20px;
    }

    .event-row div {
      line-height: 1.5;
      font-size: 19px;
    }

    .event-row img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 12px;
      transition: transform 0.25s ease;
    }

    .event-card {
      background: #ffffff;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      transition: all 0.25s ease;
    }

    .event-card em {
      color: #5c4b7d;
    }

    .event-card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(180, 150, 255, 0.25);
    }

    strong {
      color: #5c4b7d;
    }

    .birthday {
      border: 1px solid #e6d9f5;
      box-shadow: 0 0 12px rgba(200, 170, 255, 0.35);
      animation: gentleGlow 3s ease-in-out infinite;
    }

    .birthday:hover {
      box-shadow: 0 0 18px rgba(200, 170, 255, 0.6);
    }

    @keyframes gentleGlow {
      0% {
        box-shadow: 0 0 10px rgba(200, 170, 255, 0.25);
      }

      50% {
        box-shadow: 0 0 16px rgba(200, 170, 255, 0.45);
      }

      100% {
        box-shadow: 0 0 10px rgba(200, 170, 255, 0.25);
      }
    }
  </style>
</head>

<body>

  <div id="header-placeholder"></div>

  <div class="container">

    <img src="logo/sgc-big-logo.png">

    <h1 id="title"></h1>

    <div id="event" class="card"></div>

    <button class="button" onclick="window.location.href='index.html'">🏡 Home </button>

  </div>

  <script>

    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
      });

    let data = {};

    document.getElementById("title").innerHTML =
      `${data.title}<br>
       <span style="font-size: 0.6em; color: #888;">
       Updated: ${data.lastUpdated}
       </span>`;

    fetch('events.json?v=' + Date.now())
      .then(response => response.json())
      .then(json => {
        data = json;

        // ✅ NOW data exists
        document.getElementById("title").innerHTML =
          `${data.title}<br>
       <span style="font-size: 0.6em; color: #888;">
         Updated: ${data.lastUpdated}
       </span>`;

        showEvent();
      });

    function showEvent() {
      const eventDiv = document.getElementById("event");
      eventDiv.innerHTML = "";

      data.event.forEach(item => {

        const isBirthday = item.note.toLowerCase().includes("birthday");

        if (item.status === "active") {
          eventDiv.innerHTML += `
            <div class="event-card ${isBirthday ? "birthday" : ""}">
              <div class="event-row">
                ${item.image ? `<img src="${item.image}">` : ""}
                <div>
                  <strong>${item.type}</strong><br>
                  ${item.datetime ? "🕒 " + item.datetime + "<br>" : ""}
                  ${item.location ? "📍 " + item.location + "<br>" : ""}
                  <em>
                    ${isBirthday ? "🎂 " : ""}
                    ${item.note}
                  </em>
                </div>
              </div>
            </div>
         `;
        }

      });
    }


  </script>

  <script src="app.js"></script>

</body>

</html>
