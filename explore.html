<head>
  <title>Upcoming Events</title>

  <link rel="stylesheet" href="header-styles.css">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      margin: 0;
      background: #f6f3f9;
    }

    select {
      font-size: 18px;
      padding: 8px;
    }

    label {
      font-size: 18px;
    }

    button {
      font-size: 18px;
      padding: 10px 16px;
    }

    input {
      font-size: 18px;
    }

    select,
    input {
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .container {
      width: 100%;
      max-width: 800px;
      margin: 30px auto;
      background: #ffffff;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      color: #5c4b7d;
    }

    body {
      background: linear-gradient(180deg, #f6f3f9, #ffffff);
    }

    .card {
      padding: 15px;
      border-radius: 12px;
      background: #ffffff;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    .button {
      display: block;
      margin: 20px auto;
      padding: 10px 14px;
      background: #e6d9f5;
      border: none;
      border-radius: 10px;
      cursor: pointer;

    }

    .button:hover {
      background: #d6c6f0;
      box-shadow: 0 0 10px rgba(180, 150, 255, 0.4);
    }

    .home-button {
      display: inline-block;
      margin-bottom: 20px;
      padding: 12px 20px;
      font-size: 16px;
      background: #dcd0f0;
      border-radius: 10px;
      text-decoration: none;
      color: #5c4b7d;
    }

    img {
      width: 120px;
      margin-bottom: 10px;
    }

    @keyframes gentleGlow {
      0% {
        box-shadow: 0 0 10px rgba(200, 170, 255, 0.25);
      }

      50% {
        box-shadow: 0 0 16px rgba(200, 170, 255, 0.45);
      }

      100% {
        box-shadow: 0 0 10px rgba(200, 170, 255, 0.25);
      }
    }

    #searchResults li {
      list-style: none;
      margin: 8px 0;
    }

    #searchResults a {
      text-decoration: none;
      color: #5c4b7d;
      background: #f3ecfb;
      padding: 10px;
      border-radius: 8px;
      display: block;
    }

    #searchResults a:hover {
      background: #e6d9f5;
    }
  </style>
</head>

<body>

  <div id="header-placeholder"></div>

  <div class="container">
    <h1>Explore Meetings 🔍</h1>

    <label>Month:</label><br>
    <select id="month">
      <option value="01">January</option>
      <option value="02">February</option>
      <option value="03">March</option>
      <option value="04">April</option>
      <option value="05">May</option>
      <option value="06">June</option>
      <option value="07">July</option>
      <option value="08">August</option>
      <option value="09">September</option>
      <option value="10">October</option>
      <option value="11">November</option>
      <option value="12">December</option>
    </select>

    <br><br>

    <label>Year:</label><br>
    <select id="year"></select>

    <br><br>

    <button onclick="goToMeeting()">Go</button>

    <h2>Search by Topic 🔍</h2>

    <input type="text" id="searchInput" placeholder="Enter topic, monthly focus, or daily practice..."
      onkeyup="searchMeetings()" style="width: 100%; padding: 12px; margin-bottom: 20px;">

    <ul id="searchResults"></ul>

  </div>

</body>

<script src="app.js"></script>
<script src="meetings.js"></script>

<script>

  fetch('header.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('header-placeholder').innerHTML = data;
    });

  const yearSelect = document.getElementById("year");

  const years = [...new Set(Object.values(meetings).map(m => m.year))];

  years.sort((a, b) => b - a);

  years.forEach(year => {
    const option = document.createElement("option");
    option.value = year;
    option.textContent = year;
    yearSelect.appendChild(option);
  });

  function goToMeeting() {
    const month = document.getElementById("month").value;
    const year = document.getElementById("year").value;

    const id = `${year}${month}`;

    window.location.href = `meetings.html?id=${id}`;
  }

  function searchMeetings() {
    const input = document.getElementById("searchInput").value.toLowerCase();
    const results = document.getElementById("searchResults");

    console.log("SEARCH FUNCTION RUNNING");
    results.innerHTML = "";

    if (!input) {
      localStorage.removeItem("searchResults"); // 👈 clear old results
      return;
    }

    let matches = [];

    Object.entries(meetings).forEach(([id, meeting]) => {
      const titleMatch = meeting.title.toLowerCase().includes(input);
      const tagMatch = meeting.tags?.some(tag =>
        tag.toLowerCase().includes(input)
      );

      if (titleMatch || tagMatch) {
        matches.push(id);

        const li = document.createElement("li");
        li.innerHTML = `
        <a href="meetings.html?id=${id}">
          ${meeting.title}
        </a>
      `;
        results.appendChild(li);
      }
    });

    // 👇 SAVE RESULTS (this is the key fix)
    localStorage.setItem("searchResults", JSON.stringify(matches));

    // Optional message
    if (matches.length === 0) {
      results.innerHTML = `<li style="color:#8a7fb0;">No results found 💜</li>`;
    }

    console.log("Saved searchResults:", matches); // 👈 debug
  }


</script>
