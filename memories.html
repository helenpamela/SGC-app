<!DOCTYPE html>
<html>

<head>
  <title>Shared Memories</title>
  <link rel="stylesheet" href="header-styles.css">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      margin: 0;
      background: #f6f3f9;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      background: #fff;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      color: #5c4b7d;
    }

    .subtitle {
      text-align: center;
      color: #8a7fb0;
      margin-bottom: 20px;
    }

    /* Gallery grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    .photo-card {
      background: #fff;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .photo-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 12px rgba(180, 150, 255, 0.4);
    }

    .photo-card img {
      width: 100%;
      border-radius: 10px;

    }

    .photo-card p {
      text-align: center;
      font-size: 14px;
      color: #5c4b7d;
      margin-top: 8px;
    }

    .photo-card img:hover {
      transform: scale(1.03);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
    }

    .modal-content {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 700px;
      width: 90%;
      background: #fff;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
    }

    .modal img {
      max-width: 100%;
      max-height: 70vh;
      object-fit: contain;
      border-radius: 10px;
    }

    .modal p {
      margin-top: 10px;
      color: #5c4b7d;
    }

    .close {
      position: absolute;
      right: 15px;
      top: 10px;
      font-size: 24px;
      cursor: pointer;
    }

    /* Navigation buttons */
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .nav-buttons button {
      background: #e6d9f5;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    .nav-buttons button:hover {
      background: #d6c6f0;
    }

    .then-now {
      text-align: center;
      margin-bottom: 30px;
    }

    .then-now h2 {
      margin-bottom: 15px;
    }

    .then-now-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    #thenCaption,
    #nowCaption {
      font-size: 14px;
      color: #6b5c8a;
      margin-top: 6px;
      font-style: italic;
    }


    .photo {
      max-width: 250px;
    }

    .photo img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: opacity 0.4s ease;
    }

    .photo p {
      margin-top: 8px;
      font-weight: bold;
    }

    .then-now button {
      margin-top: 15px;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background-color: #7b5cff;
      color: white;
      cursor: pointer;
    }

    .then-now button:hover {
      background-color: #6848e0;

   
    }
  </style>

</head>

<body>

  <div id="header-placeholder"></div>

  <div class="container">
    <h1>Shared Memories 💜</h1>
    <p class="subtitle">Moments we've cherished together</p>

    <section class="then-now">
      <h2>Then & Now 💫</h2>

      <div class="then-now-container">
        <div class="photo">
          <img id="thenPhoto" src="" alt="Then">
          <p><strong>Then</strong></p>
          <p id="thenCaption"></p>
        </div>

        <div class="photo">
          <img id="nowPhoto" src="" alt="Now">
          <p><strong>Now</strong></p>
          <p id="nowCaption"></p>
        </div>
      </div>

      <button onclick="shufflePhotos()">Shuffle 🎲</button>
    </section>

    <h2>🗓️ Browse by Year</h2>
    <div id="year-buttons" style="text-align:center; margin-bottom: 15px;"></div>
    <div id="gallery-year" class="gallery"></div>

    <div id="gallery" class="gallery"></div>
    <h2>🌿 2009-2014</h2>
    <p class="subtitle">Our early days</p>
    <div id="gallery-early" class="gallery"></div>

    <h2>🌸 2015-2020</h2>
    <p class="subtitle">Growing together</p>
    <div id="gallery-middle" class="gallery"></div>

    <h2>✨ 2021-2026</h2>
    <p class="subtitle">Recent memories</p>
    <div id="gallery-recent" class="gallery"></div>

    <h2>💜 Undated Memories</h2>
    <p class="subtitle">Moments that found us, even without a date</p>
    <div id="gallery-undated" class="gallery"></div>

  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <img id="modalImg">
      <p id="modalCaption"></p>

      <div class="nav-buttons">
        <button onclick="prevPhoto()">⬅ Previous</button>
        <button onclick="nextPhoto()">Next ➡</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="memories.js"></script>

  <script>
    fetch('header.html')
      .then(r => r.text())
      .then(d => document.getElementById('header-placeholder').innerHTML = d);


    function renderGallerySection(items, containerId) {
      const gallery = document.getElementById(containerId);
      gallery.innerHTML = "";

      items.forEach((item, index) => {
        gallery.innerHTML += `
      <div class="photo-card" onclick="openModal('${containerId}', ${index})">
        <img src="${item.src}">
        ${item.caption ? `<p>${item.caption}</p>` : ""}
      </div>
      `;
      });
    }

    function renderAll() {
      renderGallerySection(memories.early, "gallery-early");
      renderGallerySection(memories.middle, "gallery-middle");
      renderGallerySection(memories.recent, "gallery-recent");
      renderGallerySection(memories.undated, "gallery-undated");
    }

    let currentGroup = [];
    let currentIndex = 0;

    function openModal(groupName, index) {
      currentGroup = memories[groupName.replace("gallery-", "")];
      currentIndex = index;

      showPhoto();
      document.getElementById("modal").style.display = "block";
    }


    function showPhoto() {
      const item = currentGroup[currentIndex];
      document.getElementById("modalImg").src = item.src;
      document.getElementById("modalCaption").innerText = item.caption || "";
    }

    function nextPhoto() {
      currentIndex = (currentIndex + 1) % currentGroup.length;
      showPhoto();
    }

    function prevPhoto() {
      currentIndex = (currentIndex - 1 + currentGroup.length) % currentGroup.length;
      showPhoto();
    }

    function getYear(memory) {
      if (memory.year) return memory.year;

      const match = memory.src.match(/\d{4}/);
      return match ? parseInt(match[0]) : null;
    }


    function shufflePhotos() {
      const thenImg = document.getElementById("thenPhoto");
      const nowImg = document.getElementById("nowPhoto");

      thenImg.style.opacity = 0;
      nowImg.style.opacity = 0;

      setTimeout(() => {

        // 👇 Combine all memory groups into one array
        const allMemories = [
          ...memories.early,
          ...memories.middle,
          ...memories.recent,
          ...memories.undated
        ];
        const thenPhotos = allMemories.filter(m => {
          const year = getYear(m);
          return year && year < 2017;
        });

        const nowPhotos = allMemories.filter(m => {
          const year = getYear(m);
          return year && year > 2023;
        });

        if (thenPhotos.length === 0 || nowPhotos.length === 0) {
          console.warn("Not enough photos for Then & Now");
          return;
        }
        const thenPick = thenPhotos[Math.floor(Math.random() * thenPhotos.length)];
        const nowPick = nowPhotos[Math.floor(Math.random() * nowPhotos.length)];

        thenImg.src = thenPick.src;
        nowImg.src = nowPick.src;

        document.getElementById("thenCaption").innerText = thenPick.caption || "";
        document.getElementById("nowCaption").innerText = nowPick.caption || "";
        // fade back in ✨
        thenImg.style.opacity = 1;
        nowImg.style.opacity = 1;

      }, 200);
    }

    function getAllMemories() {
      return [
        ...memories.early,
        ...memories.middle,
        ...memories.recent,
        ...memories.undated
      ];
    }

    function getUniqueYears() {
      const all = getAllMemories();
      const years = all
        .map(m => getYear(m))
        .filter(y => y !== null);

      return [...new Set(years)].sort((a, b) => b - a); // newest first
    }

    function renderYearButtons() {
      const container = document.getElementById("year-buttons");
      const years = getUniqueYears();

      container.innerHTML = years.map(year =>
        `<button onclick="filterByYear(${year})" style="margin:4px;">${year}</button>`
      ).join("");

      
      container.innerHTML = 
        `<button onclick="filterUndated()" style="margin:4px;">Undated</button>` +
          years.map(year =>
        `<button onclick="filterByYear(${year})" style="margin:4px;">${year}</button>`
        ).join("");
      

    }

    function filterByYear(year) {
      const all = getAllMemories();
      const filtered = all.filter(m => getYear(m) === year);

      renderGallerySection(filtered, "gallery-year");

      // highlight selected button
      document.querySelectorAll("#year-buttons button").forEach(btn => {
        btn.style.background = btn.innerText == year ? "#7b5cff" : "";
        btn.style.color = btn.innerText == year ? "white" : "";
      });

      function showAllMemories() {
        const all = getAllMemories();
        renderGallerySection(all, "gallery-year");

        // clear highlight
        document.querySelectorAll("#year-buttons button").forEach(btn => {
          btn.style.background = "";
          btn.style.color = "";
        });

        document.getElementById("gallery-year").scrollIntoView({
          behavior: "smooth"
        });
      }

      
      function filterUndated() {
        const all = getAllMemories();
        const filtered = all.filter(m => getYear(m) === null);

        renderGallerySection(filtered, "gallery-year");

        // highlight Undated
        document.querySelectorAll("#year-buttons button").forEach(btn => {
          btn.style.background = btn.innerText === "Undated" ? "#7b5cff" : "";
          btn.style.color = btn.innerText === "Undated" ? "white" : "";
        });

        document.getElementById("gallery-year").scrollIntoView({
          behavior: "smooth"
        });
      }
      */

      document.getElementById("gallery-year").scrollIntoView({
        behavior: "smooth"
      });
    }


    // Load a random pair when page opens
    window.onload = shufflePhotos;

    document.querySelector(".close").onclick = () => {
      document.getElementById("modal").style.display = "none";

    };

    renderAll();
    renderYearButtons();

  </script>

</body>

</html>
