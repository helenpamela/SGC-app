<!DOCTYPE html>

<html>


<head>
  <title>First Aid</title>

  <link rel="stylesheet" href="cliff-notes-styles.css">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f6f3f9;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      text-align: center;
      background: white;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      color: #5c4b7d;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #7a6c9d;
      margin-bottom: 30px;
      font-size: 14px;
    }


    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      width: 100%;
      margin: 12px 0;
      padding: 16px;
      /* slightly bigger */
      background: #e6d9f5;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 500;

      cursor: pointer;
      transition: all 0.2s ease;
    }

    .button:hover {
      background: #d6c6f0;
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 20px rgba(180, 150, 255, 0.35);
    }

    .home-button {
      display: inline-block;
      margin-bottom: 20px;
      padding: 12px 20px;
      font-size: 16px;
      background: #dcd0f0;
      border-radius: 10px;
      text-decoration: none;
      color: #5c4b7d;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background: white;
      margin: 3% auto;
      padding: 20px;
      width: 90%;
      max-width: 900px;
      border-radius: 16px;
      text-align: center;
    }

    .close {
      float: right;
      font-size: 28px;
      cursor: pointer;
    }

    .nav-buttons {
      margin-top: 10px;
    }

    .nav-buttons button {
      padding: 10px 16px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #e6d9f5;
      cursor: pointer;
    }


    /*
      .button:hover {
        background: #d6c6f0;
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 6px 18px rgba(180, 150, 255, 0.35);
      }
      */
    img {
      width: 120px;
      margin-bottom: 10px;
    }

    #greeting {
      color: #7a6c9d;
      font-size: 16px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
 
  <div id="header-placeholder"></div>

  <div class="container">
    <img src="cliff-notes-images/first-aid.png">
    <h1>First Aid</h1>
    <div class="subtitle">What do I need right now? ✨</div>
    <ul>   
      <li><a href="#" onclick="openModal(0)">🌬️ Deep Breathing / Ask for Help</a></li>
      <li><a href="#" onclick="openModal(1)">💛 Rescue Remedy</a></li>
      <li><a href="#" onclick="openModal(2)">🙏 Go outside in Nature / Silence / Take a nap </a></li>
    </ul>

  </div>

  <script>
      
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
      });
    
    
    const firstAidDocs = [
      "https://drive.google.com/file/d/1TPXrTxqnTJwfAFf20Fm93SIPK1twjUb8/preview",   // cn-fa-1-breathe-ask.pdf
      "https://drive.google.com/file/d/1a-PDgg1IBsWcpygvV6MwycGlHyfbzfVj/preview",   // cn-fa-2-rescue-remedy.pdf,
      "https://drive.google.com/file/d/1yDFo9cMoRfcyNCGpgCElyfDaokz-S7za/preview"   // cn-fa-3-nature-nap.pdf"
    ];

    let currentIndex = 0;

    function openModal(index) {
      currentIndex = index;
      showPage();
      document.getElementById("modal").style.display = "block";
    }

    function showPage() {
      const file = firstAidDocs[currentIndex];

      document.getElementById("modal-body").innerHTML =
        `<iframe src="${file}" width="100%" height="600px"></iframe>`;
    }

    function nextPage() {
      if (currentIndex < firstAidDocs.length - 1) {
        currentIndex++;
        showPage();
      }
    }
    function prevPage() {
      if (currentIndex > 0) {
        currentIndex--;
        showPage();
      }
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }





  </script>

  <div id="modal" class="modal">
    <div class="modal-content">

      <span class="close" onclick="closeModal()">&times;</span>

      <div id="modal-body"></div>

      <div class="nav-buttons">
        <button onclick="prevPage()">⬅️ Previous</button>
        <button onclick="nextPage()">Next ➡️</button>
      </div>

    </div>
  </div>

</body>

</html>
