<!DOCTYPE html>

<html>


<head>
  <title>Sacred Pages</title>

  <link rel="stylesheet" href="header-styles.css">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f6f3f9;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      text-align: center;
      background: white;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      color: #5c4b7d;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #7a6c9d;
      margin-bottom: 30px;
      font-size: 14px;
    }


    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      width: 100%;
      margin: 12px 0;
      padding: 16px;
      /* slightly bigger */
      background: #e6d9f5;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 500;

      cursor: pointer;
      transition: all 0.2s ease;
    }

    .button:hover {
      background: #d6c6f0;
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 20px rgba(180, 150, 255, 0.35);
    }

    .home-button {
      display: inline-block;
      margin-bottom: 20px;
      padding: 12px 20px;
      font-size: 16px;
      background: #dcd0f0;
      border-radius: 10px;
      text-decoration: none;
      color: #5c4b7d;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background: white;
      margin: 3% auto;
      padding: 20px;
      width: 90%;
      max-width: 900px;
      border-radius: 16px;
      text-align: center;
    }

    .close {
      float: right;
      font-size: 28px;
      cursor: pointer;
    }

    .nav-buttons {
      position: sticky;
      bottom: 0;
      background: white;
      padding: 12px 0;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-between;
    }

    .nav-buttons button {
      padding: 10px 16px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #e6d9f5;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-buttons button:hover {
      background: #d6c6f0;
      transform: translateY(-1px);
    }

    img {
      width: 120px;
      margin-bottom: 10px;
    }

    #greeting {
      color: #7a6c9d;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .sacred-banner h1 {
      position: relative;
      color: #5c4b7d;
      font-weight: 600;
      font-size: 38px;
      text-shadow:
        0 2px 6px rgba(255, 255, 255, 0.9),
        0 0 8px rgba(92, 75, 125, 0.2);
    }

    .sacred-banner img {
      width: 100px;
      margin-bottom: 10px;
    }

    .sacred-banner {
      background-image: url('cliff-notes-images/sacred-pages.jpg');

      /* <-- your image path */
      background-size: cover;
      background-position: center;

      padding: 40px 20px;
      border-radius: 16px;
      margin-bottom: 25px;
      text-align: center;

      position: relative;
    }

    /* Soft overlay so text is readable */
    .sacred-banner::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.35);
      /* soft white glow */
      border-radius: 16px;
    }

    #SacredPagesList {
      text-align: left;
      column-count: 2;
      column-gap: 20px;
      padding-left: 20px;
    }

    #SacredPagesList li {
      text-align: left;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>

  <div id="header-placeholder"></div>

  <div class="container">

    <div class="sacred-banner">
      <h1>Sacred Pages</h1>
    </div>

    <p style="color:#6a5d8f; margin: 10px 0 25px 0;">
      A collection of pages we return to again and again—
      reminders of who we are and what matters most.
    </p>

    <ul id="SacredPagesList"> </ul>

  </div>

  <script>

    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
      });

    let sacredPagesData = [];
    let currentIndex = 0;

    fetch('cn-sacred-pages.json')
      .then(response => response.json())
      .then(data => {
        sacredPagesData = data["items"];
        buildList();
      });

    function buildList() {
      const list = document.getElementById("sacredPagesList");
      list.innerHTML = "";

      sacredPagesData.forEach((item, index) => {
        const li = document.createElement("li");

        li.innerHTML = `
          <a href="#" onclick="openModal(${index})">
            ${item.label}
          </a>
        `;

        list.appendChild(li);
      });
    }

    function openModal(index) {
      currentIndex = index;
      showPage();
      document.getElementById("modal").style.display = "block";
    }

    function showPage() {
      const item = sacredPagesData[currentIndex];

      if (item.type === "PDF") {
        document.getElementById("modal-body").innerHTML =
          `<iframe src="${item.src1}" width="100%" height="600px"></iframe>`;
      }

      else if (item.type === "image") {
        let html = `<img src="${item.src1}" style="max-width:100%; margin-bottom:10px;">`;

        if (item.src2) {
          html += `<img src="${item.src2}" style="max-width:100%;">`;
        }
        document.getElementById("modal-body").innerHTML = html;
      }
      else {
        document.getElementById("modal-body").innerHTML =
          `<p>Oops! Something went wrong loading this resource.</p>`;
      }
    }

    function nextPage() {
      if (currentIndex < sacredPagesDataS.length - 1) {
        currentIndex++;
        showPage();
      }
    }
    function prevPage() {
      if (currentIndex > 0) {
        currentIndex--;
        showPage();
      }
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }

  </script>

  <script src="app.js"></script>

  <div id="modal" class="modal">
    <div class="modal-content">

      <span class="close" onclick="closeModal()">&times;</span>

      <div id="modal-body"></div>

      <div class="nav-buttons">
        <button onclick="prevPage()">⬅️ Previous</button>
        <button onclick="nextPage()">Next ➡️</button>
      </div>

    </div>
  </div>

</body>

</html>
