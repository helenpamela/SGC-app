

<!DOCTYPE html>
<html>
<head>
 
  <style>

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      margin: 0;
      background: #f6f3f9;
    }

    .container {
      width: 100%;
      max-width: 800px;   /* 👈 slightly narrower */
      margin: 30px auto;
      background: #ffffff;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    /* Title */

    h1 {
      text-align: center;
      color: #5c4b7d;
      margin-bottom: 5px;
    }

    /* Section headers */
    h2 {
      margin-top: 25px;
      color: #6a5d8f;
      border-bottom: 1px solid #e0d8ec;
      padding-bottom: 5px;
    }


    /* Cards */
    .card {
      padding: 15px;
      border-radius: 12px;
      background: #ffffff;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      opacity: 0;                                    /* Fade-in for cards */
      transform: translateY(10px);                  /* Fade-in for cards */
      animation: fadeIn 0.6s ease forwards;          /* Fade-in for cards */
    }


    /* Stagger effect */
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Buttons */

    .button {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      padding: 10px 14px;
      background: #e6d9f5;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
    }

    .button:hover {
      background: #d6c6f0;
      transform: translateY(-1px);
      box-shadow: 0 0 10px rgba(180,150,255,0.4);  /* Gentle button hover glow */
    }

    /* Modal background */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5); 
      animation: fadeModal 0.3s ease;
    }

    @keyframes fadeModal {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: #fff;
      padding: 15px;
      width: 90%;
      max-width: 800px;
      border-radius: 12px;

      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    /* Close button */
    .close {
      float: right;
      font-size: 24px;
      cursor: pointer;
    }

    .close-btn {
      cursor: pointer;
      position: absolute;
      z-index: 1000;
    }

    .close:hover {
      color: #a88cd6;
    }

    #pages {
      margin-top: 10px;
    }

    /* Modal iframe */
    #modalViewer {
      width: 100%;
      height: 500px;
      border: none;
    }

    /* Images */
    img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
      overflow: visible;
    }

    /* Document viewer (handouts) */
    #viewer {
      margin-top: 20px;
      width: 100%;
      height: 500px;
      border: none;
    }
   
  </style>
</head>

<body>
  <div class="container">
    <img src="sacred-pages/sacred-pages.jpg">
    <h1>Sacred Pages</h1>
   
    <p style="text-align:center; color:#6a5d8f; margin: 10px 0 25px 0;">
         A collection of pages we return to again and again—
         reminders of who we are and what matters most.
    </p>
    
    <div id="pages"></div>

    <button onclick="window.location.href='index.html'">🏡 Home</button>
 
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <iframe id="modalViewer"></iframe>
    </div>
  </div>

  <script>
    let data = {};

    fetch('sacred-pages.json?v=' + Date.now())
      .then(response => response.json())
      .then(json => {
        data = json;
        // console.log(data.focus);
        render();
      });
  
      function render() {
        const pagesDiv = document.getElementById("pages");
          pagesDiv.innerHTML = "";
          data.groups.forEach(group => {

          pagesDiv.innerHTML += `
            <h2>${group.title}</h2>
          `;

          group.items.forEach(item => {

          pagesDiv.innerHTML += `
            <button class="button" onclick="loadDoc('${item.link}')">
              📄 ${item.label}
            </button>
          `;
        });

      });
    }
    

    function loadDoc(url) {
      const modal = document.getElementById("modal");
      const viewer = document.getElementById("modalViewer");
      viewer.src = url;
      modal.style.display = "block";
    }

    const modal = document.getElementById("modal");
    const closeBtn = document.querySelector(".close");

    closeBtn.onclick = function() {
      modal.style.display = "none";
      document.getElementById("modalViewer").src = "";
    };

    modal.onclick = function(event) {
      if (event.target === modal) {
        modal.style.display = "none";
        document.getElementById("modalViewer").src = "";
      }
    };
  
  </script>

</body>
</html>
