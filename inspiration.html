<!DOCTYPE html>
<html>

<head>
  <title>Daily Inspiration</title>

  <link rel="stylesheet" href="home-styles.css">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      margin: 0;
      background: #f6f3f9;
    }

    .container {
      width: 100%;
      max-width: 800px;
      margin: 30px auto;
      background: #ffffff;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      color: #5c4b7d;
    }

    .card {
      padding: 15px;
      border-radius: 12px;
      background: #ffffff;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    .button {
      display: block;
      margin: 20px auto;
      padding: 10px 14px;
      background: #e6d9f5;
      border: none;
      border-radius: 10px;
      cursor: pointer;

    }

    .button:hover {
      background: #d6c6f0;
      box-shadow: 0 0 10px rgba(180, 150, 255, 0.4);
    }

    .home-button {
      display: inline-block;
      margin-bottom: 20px;
      padding: 12px 20px;
      font-size: 16px;
      background: #dcd0f0;
      border-radius: 10px;
      text-decoration: none;
      color: #5c4b7d;
    }

    #quote {
      text-align: center;
    }

    #quote p {
      font-style: italic;
      text-align: center;
    }

    #affirmation {
      text-align: center;
    }

    #affirmation img {
      max-width: 250px;
      border-radius: 12px;
      margin-top: 10px;
    }

    #reflection {
      text-align: center;
      background: #f9f6fc;
    }

    .fade {
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .fade.show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div id="header-placeholder"></div>

  <div class="container">

    <h1>Daily Inspiration</h1>

    <div id="quote" class="card fade show"></div>
    <div id="affirmation" class="card"></div>
    <div id="reflection" class="card fade show"></div>

    <button class="button" onclick="shuffle()">🔄 Shuffle the Cards</button>
    <button class="button" onclick="window.location.href='index.html'">
      🏡 Return Home
    </button>

  </div>

  <script>

    fetch('home-header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
      });

    let data = {};

    fetch('inspiration.json?v=' + Date.now())
      .then(response => response.json())
      .then(json => {
        data = json;
        showInspiration();
      });

    function getRandomItem(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function showInspiration() {
      const quoteDiv = document.getElementById("quote");
      const reflectionDiv = document.getElementById("reflection");

      // fade out
      quoteDiv.classList.remove("show");
      reflectionDiv.classList.remove("show");

      setTimeout(() => {
        const quote = getRandomItem(data.quotes);
        const affirmationDiv = document.getElementById("affirmation");
        const affirmation = getRandomItem(data.affirmations || []);
        const reflection = getRandomItem(data.reflections);

        quoteDiv.innerHTML = `
          <p>${quote.text}</p>
          <small>— ${quote.author}</small>
        `;


        affirmationDiv.innerHTML = affirmation?.image
          ? `<img src="${affirmation.image}" style="max-width:250px;">`
          : "";

        reflectionDiv.innerHTML = `
          <p>${reflection}</p>
        `;

        // fade in
        quoteDiv.classList.add("fade", "show");
        reflectionDiv.classList.add("fade", "show");
      }, 400);
    }

    function shuffle() {
      showInspiration();
    }

    function logout() {
      localStorage.removeItem("role");

      // Only run if elements exist
      const app = document.getElementById("appContent");
      const login = document.getElementById("loginScreen");

      if (app && login) {
        app.style.display = "none";
        login.style.display = "flex";
      } else {
        // If on a child page, just go back home
        window.location.href = "index.html";
      }
    }

  </script>
</body>

</html>
