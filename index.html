<!DOCTYPE html>

<html>

<head>
  <title>Spiritual Growth Club</title>

  <style>
    #loginScreen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      /* vertical center */
      align-items: center;
      /* horizontal center */
      height: 100vh;
      /* full screen height */
      text-align: center;
    }

    #loginScreen input {
      padding: 8px;
      margin: 10px;
      font-size: 16px;
    }

    #loginScreen button {
      padding: 8px 16px;
      cursor: pointer;
    }

    .login-card {
      background: white;
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      width: 300px;
    }

    .login-card:hover {
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
      transition: 0.3s;
    }

    .login-card input {
      width: 100%;
      padding: 10px;
      margin: 12px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .login-card button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background-color: #7c6bcf;
      /* soft purple */
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .login-card button:hover {
      background-color: #6a5bb5;
    }



    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f6f3f9;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      text-align: center;
      background: white;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      color: #5c4b7d;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #7a6c9d;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 14px;
      background: #e6d9f5;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .button:hover {
      background: #d6c6f0;
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 6px 18px rgba(180, 150, 255, 0.35);
    }

    .home-button {
      display: inline-block;
      margin-bottom: 20px;
      padding: 12px 20px;
      font-size: 16px;
      background: #dcd0f0;
      border-radius: 10px;
      text-decoration: none;
      color: #5c4b7d;
    }

    img {
      width: 300px;
      margin-bottom: 10px;
    }

    #greeting {
      color: #7a6c9d;
      font-size: 16px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div id="loginScreen">
    <div class="login-card">

      <h2>Welcome to our sacred circle🌟</h2>
      <p>Enter the magic word to begin:</p>

      <input type="password" id="accessInput" placeholder="Access word" />
      <button onclick="checkAccess()">Enter</button>

      <p id="errorMsg" style="color:red; display:none;">
        Oops! Try again 😊
      </p>

    </div>
  </div>



  <div id="appContent" style="display:none;">
    <a href="index.html" class="home-button">🏡 Home</a>
    <div class="container">

      <img src="logo/sgc-big-logo.png">
      <h1>Spiritual Growth Club</h1>
      
      <h2 id="greeting"></h2>
      <div class="subtitle">Choose your path for today ✨</div>

      <a href="monthly.html">
        <button class="button">📅 Monthly Theme</button>
      </a>

      <a href="inspiration.html">
        <button class="button">🌿 Daily Inspiration</button>
      </a>

      <a href="events.html">
        <button class="button">💜 Upcoming Events</button>
      </a>

      <a href="cliff-notes.html">
        <button class="button">📖 Cliff Notes</button>
      </a>

      <button class="button">
        🔍 Explore
      </button>

      <button class="button">
        📎 Shared Memories
      </button>
    </div>
  </div>

  <script>
    const ACCESS_WORD = "luminary"; // change this

    function checkAccess() {
      const input = document.getElementById("accessInput").value;

      if (input === ACCESS_WORD) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("appContent").style.display = "block";
        localStorage.setItem("accessGranted", "true");
      } else {
        document.getElementById("errorMsg").style.display = "block";
      }
    }

    window.onload = function () {
      if (localStorage.getItem("accessGranted") === "true") {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("appContent").style.display = "block";
      }
    };

    const hour = new Date().getHours();
    let timeGreeting = "";

    if (hour < 12) {
      timeGreeting = "Good morning";
    } else if (hour < 18) {
      timeGreeting = "Good afternoon";
    } else {
      timeGreeting = "Good evening";
    }

    document.getElementById("greeting").innerText =
      timeGreeting + " ☀️";


  </script>


</body>

</html>
