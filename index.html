<!DOCTYPE html>

<html>

<head>
  <title>Spiritual Growth Club</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="header-styles.css">


  <style>
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    #loginScreen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      /* vertical center */
      align-items: center;
      /* horizontal center */
      height: 100vh;
      /* full screen height */
      text-align: center;
    }

    #loginScreen input {
      padding: 8px;
      margin: 10px;
      font-size: 16px;
    }

    #loginScreen button {
      padding: 8px 16px;
      cursor: pointer;
    }

    .login-card {
      background: white;
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      width: 300px;
    }

    .login-card:hover {
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
      transition: 0.3s;
    }

    .login-card input {
      width: 100%;
      padding: 10px;
      margin: 12px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .login-card button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background-color: #7c6bcf;
      /* soft purple */
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .login-card button:hover {
      background-color: #6a5bb5;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f6f3f9;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      text-align: center;
      background: white;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      color: #5c4b7d;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #7a6c9d;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 14px;
      background: #e6d9f5;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .button:hover {
      background: #d6c6f0;
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 6px 18px rgba(180, 150, 255, 0.35);
    }

    img {
      width: 300px;
      margin-bottom: 10px;
    }

    #greeting {
      color: #7a6c9d;
      font-size: 16px;
      margin-bottom: 10px;
    }

    /* Remove underline from all links */
    a {
      text-decoration: none;
    }

    /* Add underline only on hover */
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div id="loginScreen">
    <div class="login-card">

      <h2>Welcome to our sacred circle🌟</h2>
      <p>Enter the magic word to begin:</p>

      window.onload = () => {
      document.getElementById("password").focus();
      };

      <form onsubmit="handleLogin(event)">
        <p style="font-size: 13px; color: #8a7fb0; margin-top: -5px;">
          Press Enter to continue ⏎
        </p>
        <input type="password" id="accessInput" placeholder="Access word" autofocus>
        <button type="submit">Enter</button>
      </form>

      <p id="errorMsg" style="color:red; display:none;">
        Oops! Try again 😊
      </p>

    </div>
  </div>

  <div id="header-placeholder"></div>

  <div id="appContent" style="display:none;">

    <div class="container">

      <img src="logo/sgc-big-logo.png">
      <h1>Spiritual Growth Club</h1>

      <h2 id="greeting"></h2>
      <div class="subtitle">Choose your path for today ✨</div>

      <a href="monthly.html">
        <button class="button">📅 Monthly Theme</button>
      </a>

      <a href="inspiration.html">
        <button class="button">🌿 Daily Inspiration</button>
      </a>

      <a href="events.html">
        <button class="button">💜 Upcoming Events</button>
      </a>

      <a href="cliff-notes.html">
        <button class="button">📖 Cliff Notes</button>
      </a>

      <a href="explore.html">
        <button class="button">🔍 Explore</button>
      </a>

      <a href="memories.html">
        <button class="button">🔍 Shared Memories</button>
      </a>

    </div>
  </div>

  <script>


    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
      });

    function handleLogin(event) {
      event.preventDefault(); // prevents page reload
      checkAccess(); // your existing login function
    }

    window.onload = function () {
      const role = localStorage.getItem("role");

      if (role) {
        showApp();
      }
    };

    const hour = new Date().getHours();
    let timeGreeting = "";

    if (hour < 12) {
      timeGreeting = "Good morning";
    } else if (hour < 18) {
      timeGreeting = "Good afternoon";
    } else {
      timeGreeting = "Good evening";
    }

    document.getElementById("greeting").innerText =
      timeGreeting + " ☀️";



  </script>

  <script src="app.js"></script>

</body>

</html>
