<!DOCTYPE html>

<html>
<head>
  <title>Spiritual Growth Club</title>
 
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f6f3f9;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      text-align: center;
      background: white;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      color: #5c4b7d;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #7a6c9d;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 14px;
      background: #e6d9f5;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .button:hover {
     background: #d6c6f0;
     transform: translateY(-3px) scale(1.02);
     box-shadow: 0 6px 18px rgba(180,150,255,0.35);
    }

    img {
      width: 120px;
      margin-bottom: 10px;
    }

    #greeting {
      color: #7a6c9d;
      font-size: 16px;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

  <div class="container">
    <img src="logo/sgc-big-logo.png">
    <h1>Spiritual Growth Club</h1>
    <h2 id="greeting"></h2>
    <div class="subtitle">Choose your path for today ✨</div>

    <button class="button" onclick="location.href='monthly.html'">
      📅 Monthly Theme
    </button>

    <button class="button" onclick="location.href='inspiration.html'">
      🌿 Daily Inspiration
    </button>

    <button class="button" onclick="location.href='events.html'">
      💜 Upcoming Events
    </button>

    <button class="button">
      🧘 Practices
    </button>

    <button class="button">
      📖 Topics
    </button>

    <button class="button">
      📎 Handouts
    </button>

    <button class="button">
      ✨ Luminaries
    </button>

  </div>

  <script>
    const name = ""; // we’ll make this dynamic later 😉

    const hour = new Date().getHours();
    let timeGreeting = "";

    if (hour < 12) {
      timeGreeting = "Good morning";
    } else if (hour < 18) {
      timeGreeting = "Good afternoon";
    } else {
      timeGreeting = "Good evening";
    }

    document.getElementById("greeting").innerText =
      timeGreeting + " ☀️";
 
      
</script>


</body>
</html>
