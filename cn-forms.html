<!DOCTYPE html>

<html>


<head>
  <title>Forms</title>

  <link rel="stylesheet" href="header-styles.css">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f6f3f9;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      text-align: center;
      background: white;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      color: #5c4b7d;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #7a6c9d;
      margin-bottom: 30px;
      font-size: 16px;
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      width: 100%;
      margin: 12px 0;
      padding: 16px;
      /* slightly bigger */
      background: #e6d9f5;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 500;

      cursor: pointer;
      transition: all 0.2s ease;
    }

    .button:hover {
      background: #d6c6f0;
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 20px rgba(180, 150, 255, 0.35);
    }

    .home-button {
      display: inline-block;
      margin-bottom: 20px;
      padding: 12px 20px;
      font-size: 16px;
      background: #dcd0f0;
      border-radius: 10px;
      text-decoration: none;
      color: #5c4b7d;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background: white;
      margin: 3% auto;
      padding: 20px;
      width: 90%;
      max-width: 900px;
      border-radius: 16px;
      text-align: center;
    }

    .close {
      float: right;
      font-size: 28px;
      cursor: pointer;
    }

    .nav-buttons {
      margin-top: 10px;
    }

    .nav-buttons button {
      padding: 10px 16px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #e6d9f5;
      cursor: pointer;
    }


    img {
      width: 120px;
      margin-bottom: 10px;
    }

    #greeting {
      color: #7a6c9d;
      font-size: 16px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div id="header-placeholder"></div>

  <div class="container">
    <img src="cliff-notes-images/forms.png">
    <h1>Forms</h1>
    <div class="subtitle">What form wants to be utilized? ✨</div>

    <input type="text" id="searchBox" placeholder="What am I looking for..."
      style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd;">

    <ul id="formsList">
      <li><a href="#" onclick="openModal(0)">🛞 Wheel of Balance</a></li>
      <li><a href="#" onclick="openModal(1)">➕ More or Less</a></li>
      <li><a href="#" onclick="openModal(2)">❓ What Do You Want?</a></li>
      <li><a href="#" onclick="openModal(3)">💘 What I Love About Myself</a></li>
      <li><a href="#" onclick="openModal(4)">💰 100 Things I Want</a></li>
      <li><a href="#" onclick="openModal(5)">👍🏻 Values Survey</a></li>
      <li><a href="#" onclick="openModal(6)">👍🏻 Values Survey 2</a></li>
    </ul>

  </div>

  <script>

    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
      });


    const formsDocs = [
      "https://drive.google.com/file/d/1QQecWYG05tUW_MNWweGs0RKJ7rV4S0sv/preview",  // F1_WheelOfBalance.pdf
      "https://drive.google.com/file/d/1rvCsbhuS2h-kDeYRhNk_UFDTqeQY041l/preview",  // F2a_MoreOrLess_SWIHA.pdf
      "https://drive.google.com/file/d/1VQZSAfUGGG1ntuvVBcTkgbypTMvM7mzQ/preview",  // F2b_MoreOrLess_Pretty.pdf
      "https://drive.google.com/file/d/1RgJXzYMVqx6LAHUrI8Vw2xKBIo1uxJWP/preview",  // F3_What_I_LoveAboutMyself.pdf
      "https://drive.google.com/file/d/1aHexdrhnOwoD5UX-YNjFV9a1uPSXNln_/preview",  // F4_100_Things_I_Want.pdf
      "https://drive.google.com/file/d/1QCSCsz9R3n96jpOa2xTGkBcYOcv6Sb8x/preview",  // F5a_ValuesSurvey.pdf
      "https://drive.google.com/file/d/1xxYBLr3nOPG99J3uvE4CS4eKsrs7P7Kp/preview"   // F5b_ValuesSurvey.pdf
    ];

    let currentIndex = 0;

    function openModal(index) {
      currentIndex = index;
      showPage();
      document.getElementById("modal").style.display = "block";
    }

    function showPage() {
      const file = formsDocs[currentIndex];

      document.getElementById("modal-body").innerHTML =
        `<iframe src="${file}" width="100%" height="600px"></iframe>`;
    }

    function nextPage() {
      if (currentIndex < formsDocs.length - 1) {
        currentIndex++;
        showPage();
      }
    }
    function prevPage() {
      if (currentIndex > 0) {
        currentIndex--;
        showPage();
      }
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }

  </script>

  <script id="kx8c2t">
    const searchBox = document.getElementById("searchBox");
    const items = document.querySelectorAll("#formsList li");

    searchBox.addEventListener("keyup", function () {
      const searchText = searchBox.value.toLowerCase();

      items.forEach(function (item) {
        const text = item.textContent.toLowerCase();
        if (text.includes(searchText)) {
          item.style.display = "";
        } else {
          item.style.display = "none";
        }
      });
    });
  </script>

  <script src="app.js"></script>

  <div id="modal" class="modal">
    <div class="modal-content">

      <span class="close" onclick="closeModal()">&times;</span>

      <div id="modal-body"></div>

      <div class="nav-buttons">
        <button onclick="prevPage()">⬅️ Previous</button>
        <button onclick="nextPage()">Next ➡️</button>
      </div>

    </div>
  </div>

</body>

</html>
