<!DOCTYPE html>
<html>

<head>

  <title>Meeting</title>

  <link rel="stylesheet" href="header-styles.css">

  <style>
    .meeting-banner h1 {
      position: relative;
      color: #f2f0f4;
      font-weight: 600;
      font-size: 38px;
      /* text-shadow:
        0 2px 6px rgba(255, 255, 255, 0.9),
        0 0 8px rgba(92, 75, 125, 0.2); */
    }

    .meeting-banner img {
      width: 100px;
      margin-bottom: 10px;
    }

    .meeting-banner {
      background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
        url('meeting-images/meetings-header.jpg');
      background-size: cover;
      background-position: center;
      position: relative;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      margin: 0;
      background: #f6f3f9;
    }


    .container {
      width: 100%;
      max-width: 800px;
      /* 👈 slightly narrower */
      margin: 30px auto;
      background: #ffffff;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    /* Title */

    h1 {
      text-align: center;
      color: #5c4b7d;
      margin-bottom: 5px;
    }

    /* Section headers */
    h2 {
      margin-top: 30px;
      color: #6a5d8f;
      border-bottom: 1px solid #e0d8ec;
      padding-bottom: 5px;
    }

    /* Subtitles */
    .subtitle {
      font-weight: normal;
      color: #8a7fb0;
      font-size: 0.9em;
    }

    /* Cards */
    .card {
      padding: 15px;
      border-radius: 12px;
      background: #ffffff;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      opacity: 0;
      /* Fade-in for cards */
      transform: translateY(10px);
      /* Fade-in for cards */
      animation: fadeIn 0.6s ease forwards;
      /* Fade-in for cards */
    }

    .card p {
      text-align: center;
      margin-top: 8px;
      color: #5c4b7d;
      font-size: 16px;
    }


    /* Stagger effect */
    .card:nth-child(1) {
      animation-delay: 0.1s;
    }

    .card:nth-child(2) {
      animation-delay: 0.2s;
    }

    .card:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Buttons */

    .button {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      padding: 10px 14px;
      background: #e6d9f5;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 20px;
    }

    .button:hover {
      background: #d6c6f0;
      transform: translateY(-1px);
      box-shadow: 0 0 10px rgba(180, 150, 255, 0.4);
      /* Gentle button hover glow */
    }

    .home-button {
      display: inline-block;
      margin-bottom: 20px;
      padding: 12px 20px;
      font-size: 16px;
      background: #dcd0f0;
      border-radius: 10px;
      text-decoration: none;
      color: #5c4b7d;
    }

    /* Modal background */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      animation: fadeModal 0.3s ease;
    }

    @keyframes fadeModal {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .modal-content {
      background: #fff;
      padding: 15px;
      width: 90%;
      max-width: 800px;
      border-radius: 12px;

      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    /* Close button */
    .close {
      float: right;
      font-size: 24px;
      cursor: pointer;
    }

    .close-btn {
      cursor: pointer;
      position: absolute;
      z-index: 1000;
    }

    .close:hover {
      color: #a88cd6;
    }

    /* Modal iframe */
    #modalViewer {
      width: 100%;
      height: 500px;
      border: none;
    }


    /* Monthly Focus */

    #focus {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: stretch;
    }

    #focus .card {
      flex: 0 0 calc(50% - 15px);
      transition: transform 0.2s ease;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    #focus .card p {
      text-align: center;
      margin-top: 10px;
      color: #5c4b7d;
    }

    #focus .card:hover {
      transform: translateY(-3px);
    }

    #focus img {
      width: 100%;
      margin-bottom: 10px;
    }

    /* Images */

    .card img {
      width: 100%;
      max-width: 400px;
      height: auto;
      margin: 0 auto;
      display: block;
      border-radius: 10px;
    }

    #focus img {
      width: 100%;
    }

    #other img,
    #luminary img,
    #practice img {
      max-width: 300px;
      margin: 0 auto;
      display: block;
    }

    /* Document viewer (handouts) */
    #viewer {
      margin-top: 20px;
      width: 100%;
      height: 500px;
      border: none;
    }

    /* Video iframe (inside practice card) */

    .card iframe {
      width: 100%;
      max-width: 500px;
      height: 280px;
      margin: 10px auto 0;
      display: block;
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <div id="header-placeholder"></div>

  <div class="container">

    <div class="banner meeting-banner">
      <h1 id="title"></h1>
    </div>

    <div id="search-nav" style="display:none; text-align:center; margin-bottom:15px;">
      <button onclick="prevResult()">⬅ Previous</button>
      <button onclick="nextResult()">Next ➡</button>
    </div>


    <h2>Agenda</h2>
    <div id="final_agenda"></div>

    <div id="teacher-only" class="teacher-only" style="display:none;">
      <h2>Teacher Materials</h2>
      <div id="working_agenda"></div>
    </div>

    <h2>Announcements</h2>
    <div id="announcements"></div>

    <h2>Set Intention</h2>
    <div id="intention"></div>

    <h2>Our Vision</h2>
    <div id="vision"></div>

    <h2>Spread Lovingkindness</h2>
    <div id="lovingkindness"></div>

    <h2>Invocation</h2>
    <div id="invocation"></div>

    <h2 id="focus-title">Monthly Focus</h2>
    <div id="focus"></div>

    <h2 id="practice-title">Daily Practice</h2>
    <div id="practice"></div>

    <h2>Affirmation</h2>
    <div id="affirmation"></div>

    <h2>Meditation</h2>
    <div id="meditation"></div>

    <h2 id="luminary-title">Luminary</h2>
    <div id="luminary"></div>

    <h2 id="topic-title">Topic</h2>
    <div id="topic"></div>

    <h2>Other Handouts</h2>
    <div id="other"></div>

    <button onclick="window.location.href='index.html'">🏡 Home</button>

  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <iframe id="modalViewer"></iframe>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="meetings.js"></script>

  <script>

    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
      });

    let data = {};

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id");

    let searchResults = [];

    data = meetings[id];

    if (!data) {
      document.getElementById("title").innerText = "Meeting not found 😢";
      console.log("Invalid meeting ID:", id);
    } else {
      render();

      // 👇 ADD THIS RIGHT HERE
      searchResults = JSON.parse(localStorage.getItem("searchResults") || "[]");

      console.log("Search results:", searchResults);

      document.getElementById("search-nav").style.display = "block";

      // Delay permissions slightly so DOM is fully ready
      setTimeout(() => {
        applyPermissions();
      }, 0);
    }

    function render() {

      document.getElementById("title").innerHTML =
        `${data.title}<br><span style="font-size: 0.6em; color: #888;"></span>`;

      console.log("setTitle for MonthlyFocus next:", data.focus?.title);
      setTitle("focus-title", "Monthly Focus", data.focus?.title);

      console.log("setTitle for DailyPractice next:", data.practice?.title);
      setTitle("practice-title", "Daily Practice", data.practice?.title);

      console.log("setTitle for Topic next:", data.topic?.title);
      setTitle("topic-title", "Topic", data.topic?.title);

      console.log("setTitle for Meditation next:", data.meditation?.title);
      setTitle("meditation-title", "Meditation", data.meditation?.title);
      setTitle("luminary-title", "Luminary", data.luminary?.title);


      // Titles, setup, special sections
      document.getElementById("title").innerHTML = data.title;
       
      // Now render each section using your helper ✨
      renderItems(data.final_agenda || [], "final_agenda");
      console.log("renderItems working agenda next:");
      renderItems(data.teacher_only?.working_agenda || [], "working_agenda");
      renderItems(data.announcements || [], "announcements");
      renderItems(data.intention || [], "intention");
      renderItems(data.vision || [], "vision");
      renderItems(data.lovingkindness || [], "lovingkindness");
      renderItems(data.invocation || [], "invocation");
      console.log("renderItems monthly focus next:");
      renderItems(data.focus?.items || [], "focus");
      renderItems(data.practice?.items || [], "practice");
      renderItems(data.affirmation || [], "affirmation");
      renderItems(
        Array.isArray(data.meditation)
          ? data.meditation
          : data.meditation?.items || [],
        "meditation"
      );
      renderItems(data.luminary?.items || [], "luminary");
      renderItems(data.topic?.items || [], "topic");
      renderItems(data.other || [], "other");

    }

    function setTitle(id, main, sub) {
      const el = document.getElementById(id);

      console.log("in setTitle function, id:", id);

      if (!el) return;

      if (sub && sub.trim() !== "") {
        el.innerHTML = `${main} <span class="subtitle">- ${sub}</span>`;
      } else {
        el.innerHTML = main;
      }
    }

    function renderItems(items, containerId) {
      const div = document.getElementById(containerId);
      div.innerHTML = "";

      console.log("In renderItems function items length:", items.length);

      if (!items || items.length === 0) return;
      console.log("In renderItems function item type", item.type);

      items.forEach(item => {
        let content = "";

        if (item.type === "image") {
          content = `
            <img src="${item.src}">
            ${item.label ? `<p>${item.label}</p>` : ""}
         `;
        }

        if (item.type === "pdf") {
          content = `
        <button class="button" onclick="loadDoc('${item.src}')">
          📄 ${item.label || "Open"}
        </button>
      `;
        }

        if (item.type === "video") {
          content = `
        <iframe src="${item.src}" allowfullscreen></iframe>
      `;
        }

        if (item.type === "text") {
          content = `<p>${item.label}</p>`;
        }

        div.innerHTML += `<div class="card">${content}</div>`;
      });
    }

    function loadDoc(url) {
      const modal = document.getElementById("modal");
      const viewer = document.getElementById("modalViewer");
      viewer.src = url;
      modal.style.display = "block";
    }


    window.addEventListener("load", () => {
      const modal = document.getElementById("modal");
      const closeBtn = document.querySelector(".close");

      if (closeBtn) {
        console.log("Close button:", closeBtn);
        closeBtn.onclick = function () {
          modal.style.display = "none";
          document.getElementById("modalViewer").src = "";
        };
      }

      if (modal) {
        modal.onclick = function (event) {
          if (event.target === modal) {
            modal.style.display = "none";
            document.getElementById("modalViewer").src = "";
          }
        };
      }
    });

    function getMeetingList() {
      // If valid search results exist, use them
      if (searchResults && searchResults.length > 1) {
        return searchResults;
      }

      // Otherwise use all meetings (calendar order)
      return Object.keys(meetings);
    }

    function nextResult() {
      let list = getMeetingList();
      let currentIndex = list.findIndex(x => String(x) === String(id));

      if (currentIndex === -1) currentIndex = 0;

      let nextId = list[(currentIndex + 1) % list.length];
      window.location.href = `meetings.html?id=${nextId}`;
    }

    function prevResult() {
      let list = getMeetingList();
      let currentIndex = list.findIndex(x => String(x) === String(id));

      if (currentIndex === -1) currentIndex = 0;

      let prevId = list[(currentIndex - 1 + list.length) % list.length];
      window.location.href = `meetings.html?id=${prevId}`;
    }





  </script>



</body>

</html>
