<!DOCTYPE html>

<html>


<head>
  <title>Tools</title>

  <link rel="stylesheet" href="header-styles.css">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f6f3f9;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      text-align: center;
      background: white;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      color: #5c4b7d;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #7a6c9d;
      margin-bottom: 30px;
      font-size: 16px;
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      width: 100%;
      margin: 12px 0;
      padding: 16px;
      /* slightly bigger */
      background: #e6d9f5;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 500;

      cursor: pointer;
      transition: all 0.2s ease;
    }

    .button:hover {
      background: #d6c6f0;
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 20px rgba(180, 150, 255, 0.35);
    }

    .home-button {
      display: inline-block;
      margin-bottom: 20px;
      padding: 12px 20px;
      font-size: 16px;
      background: #dcd0f0;
      border-radius: 10px;
      text-decoration: none;
      color: #5c4b7d;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background: white;
      margin: 3% auto;
      padding: 20px;
      width: 90%;
      max-width: 900px;
      border-radius: 16px;
      text-align: center;
    }

    .close {
      float: right;
      font-size: 28px;
      cursor: pointer;
    }

    .nav-buttons {
      margin-top: 10px;
    }

    .nav-buttons button {
      padding: 10px 16px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #e6d9f5;
      cursor: pointer;
    }

    img {
      width: 120px;
      margin-bottom: 10px;
    }

    #greeting {
      color: #7a6c9d;
      font-size: 16px;
      margin-bottom: 10px;
    }

    #searchBox:focus {
      outline: none;
      border-color: #b9a7e6;
      box-shadow: 0 0 5px rgba(180, 150, 255, 0.4);
    }

    #toolsList {
      text-align: left;
      column-count: 2;
      column-gap: 20px;
      padding-left: 20px;
    }

    #toolsList li {
      text-align: left;
      margin-bottom: 8px;
    }


  </style>
</head>

<body>

  <div id="header-placeholder"></div>

  <div class="container">
    <img src="cliff-notes-images/tools.png">
    <h1>Tools</h1>
    <div class="subtitle">What tool would be helpful for me? ✨</div>

    <input type="text" id="searchBox" placeholder="What am I looking for..."
      style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd;">

    <ul id="toolsList">
      <li><a href="#" onclick="openModal(0)">🌷 Aromatherapy</a></li>
      <li><a href="#" onclick="openModal(1)">🌸 Flower Essences</a></li>
      <li><a href="#" onclick="openModal(2)">🪻 Flower Essences - Bach</a></li>
      <li><a href="#" onclick="openModal(3)">💎 Crystals</a></li>
      <li><a href="#" onclick="openModal(4)">💎 Crystals & Chakras</a></li>
      <li><a href="#" onclick="openModal(5)">☝🏻 EFT</a></li>
      <li><a href="#" onclick="openModal(6)">☝🏻 EFT Quotes</a></li>
      <li><a href="#" onclick="openModal(7)">🎵 Music Song Dance</a></li>
      <li><a href="#" onclick="openModal(8)">🎴 Oracle Cards</a></li>
      <li><a href="#" onclick="openModal(9)">⚡ Energy Medicine</a></li>
      <li><a href="#" onclick="openModal(10)">⚖️ Pendulum</a></li>
    </ul>

  </div>

  <script>

    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
      });


    const toolsDocs = [
      "https://drive.google.com/file/d/1UW45E_s0IgweF1gdAEmXNwmc4oHKgKcs/preview",  // T1_Aromatherapy.pdf
      "https://drive.google.com/file/d/1UTkEmHtCkwHDOgVYGCB0D2xxBjXt6NrG/preview",  // T2a_FlowerEssences.pdf,
      "https://drive.google.com/file/d/1aTcM7lGogcBnYeyKSZhXWmGZcxQjFLl_/preview",  // T2b_FlowerEssencesBach.pdf
      "https://drive.google.com/file/d/19LgnyDMVZuTqejH6oqP3MyT9_dmZYeuy/preview",  // T3a_Crystals.pdf
      "https://drive.google.com/file/d/1WVVkIEPpZbJdJ2qOV5UgvZrZ90CVd78c/preview",  // T3b_CrystalsChakra.pdf
      "https://drive.google.com/file/d/1HjucekFnVuc6rsNN8aExqV3jeHIUTfYx/preview",  // T4a_EFT.pdf
      "https://drive.google.com/file/d/1ehZDzbNh5CaqxsKoeHYVw_dhG9b8x5n3/preview",  // T4b_EFT.pdf
      "https://drive.google.com/file/d/114O5ZH1NDfx5CTUQYUxsG3LrEOHHyJ6J/preview",  // T5_MusicSongDance.pdf
      "https://drive.google.com/file/d/1YjPLq0ILLL3kX_4nVHUqhFpFHWgkA8u_/preview",  // T6_OracleCards.pdf
      "https://drive.google.com/file/d/1FwqUCf23ap3ADrWwHCVXcz9lc7Nwr2hR/preview",  // T7_EnergyMedicine.pdf
      "https://drive.google.com/file/d/1-wVG-IC9ekHdSpFtS40BfqM_MsTtpmdT/preview"  // T8_Pendulum.pdf
    ];

    let currentIndex = 0;

    function openModal(index) {
      currentIndex = index;
      showPage();
      document.getElementById("modal").style.display = "block";
    }

    function showPage() {
      const file = toolsDocs[currentIndex];

      document.getElementById("modal-body").innerHTML =
        `<iframe src="${file}" width="100%" height="600px"></iframe>`;
    }

    function nextPage() {
      if (currentIndex < toolsDocs.length - 1) {
        currentIndex++;
        showPage();
      }
    }
    function prevPage() {
      if (currentIndex > 0) {
        currentIndex--;
        showPage();
      }
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }

  </script>

  <script id="kx8c2t">
    const searchBox = document.getElementById("searchBox");
    const items = document.querySelectorAll("#toolsList li");

    searchBox.addEventListener("keyup", function () {
      const searchText = searchBox.value.toLowerCase();

      items.forEach(function (item) {
        const text = item.textContent.toLowerCase();
        if (text.includes(searchText)) {
          item.style.display = "";
        } else {
          item.style.display = "none";
        }
      });
    });
  </script>

  <div id="modal" class="modal">
    <div class="modal-content">

      <span class="close" onclick="closeModal()">&times;</span>

      <div id="modal-body"></div>

      <div class="nav-buttons">
        <button onclick="prevPage()">⬅️ Previous</button>
        <button onclick="nextPage()">Next ➡️</button>
      </div>

    </div>
  </div>

  <script src="app.js"></script>

</body>

</html>
