<!DOCTYPE html>

<html>


<head>
  <title>Cliff Notes</title>

  <link rel="stylesheet" href="home-styles.css">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f6f3f9;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      text-align: center;
      background: white;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      color: #5c4b7d;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #7a6c9d;
      margin-bottom: 30px;
      font-size: 14px;
    }


    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      width: 100%;
      margin: 12px 0;
      padding: 16px;
      /* slightly bigger */
      background: #e6d9f5;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 500;

      cursor: pointer;
      transition: all 0.2s ease;
    }

    .button:hover {
      background: #d6c6f0;
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 20px rgba(180, 150, 255, 0.35);
    }

    .home-button {
      display: inline-block;
      margin-bottom: 20px;
      padding: 12px 20px;
      font-size: 16px;
      background: #dcd0f0;
      border-radius: 10px;
      text-decoration: none;
      color: #5c4b7d;
    }

    .nav-buttons {
      margin-top: 10px;
    }

    .nav-buttons button {
      padding: 10px 16px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #e6d9f5;
      cursor: pointer;
    }
    

    /* Images */
    img {
      width: 100%;
      max-height: 300px;      /* 👈 controls the height */
      object-fit: cover;     /* 👈 keeps it nicely cropped */
      border-radius: 10px;
      margin-top: 10px;
    }

    #greeting {
      color: #7a6c9d;
      font-size: 16px;
      margin-bottom: 10px;
    }

    /* Use this section to place title on top of image  */
    .hero {
      position: relative;
      width: 100%;
    }

    .hero img {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 10px;
    }

    .hero-title {
      position: absolute;
      top:  50%;  
      left: 50%;
     
      transform: translate(-50%, -50%);
      margin: 0;
      width: auto;

      color: white;
      font-size: 32px;
      font-weight: 600;
      text-align: center;
          
      background: rgba(255, 235, 130, 0.9);

      color: #5c4b7d;
      padding: 8px 18px;
      border-radius: 12px;
      font-weight: 600;

      line-height: 1.2;
      display: inline-block;
    }
    
  </style>
</head>

<body>

  <div id="header-placeholder"></div>

  <div class="container">

    <div class="hero">
      <img src="cliff-notes-images/cliff-notes-header.png">
      <h1 class="hero-title">Cliff Notes</h1>
    </div>

    <div class="subtitle">What topic is calling to me? ✨</div>

    <a href="cn-sacred-pages.html">
      <button class="button">💜 Sacred Pages</button>
    </a>

    <a href="cn-first-aid.html">
      <button class="button">🚑 First Aid</button>
    </a>

    <a href="cn-daily-practices.html">
      <button class="button">🏋🏻‍♀️ Daily Practices</button>
    </a>

    <a href="cn-concepts.html">
      <button class="button">💡 Concepts</button>
    </a>

    <a href="cn-tools.html">
      <button class="button">⚒️ Tools</button>
    </a>

    <a href="cn-forms.html">
      <button class="button">📰 Forms</button>
    </a>

    <a href="cn-resources.html">
      <button class="button">🗝️ Resources</button>
    </a>


  </div>

  <script>

    fetch('home-header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
      });

  </script>

  <script src="app.js"></script>

</body>

</html>
