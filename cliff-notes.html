    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      width: 100%;
      margin: 12px 0;
      padding: 16px;
      /* slightly bigger */
      background: #e6d9f5;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 500;

      cursor: pointer;
      transition: all 0.2s ease;
    }

    .button:hover {
      background: #d6c6f0;
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 20px rgba(180, 150, 255, 0.35);
    }

    .home-button {

      margin-bottom: 20px;
