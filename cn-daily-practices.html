<!DOCTYPE html>

<html>


<head>
  <title>Daily Practices</title>

  <link rel="stylesheet" href="header-styles.css">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f6f3f9;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      text-align: center;
      background: white;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      color: #5c4b7d;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #7a6c9d;
      margin-bottom: 30px;
      font-size: 14px;
    }


    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      width: 100%;
      margin: 12px 0;
      padding: 16px;
      /* slightly bigger */
      background: #e6d9f5;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 500;

      cursor: pointer;
      transition: all 0.2s ease;
    }

    .button:hover {
      background: #d6c6f0;
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 20px rgba(180, 150, 255, 0.35);
    }

    .home-button {
      display: inline-block;
      margin-bottom: 20px;
      padding: 12px 20px;
      font-size: 16px;
      background: #dcd0f0;
      border-radius: 10px;
      text-decoration: none;
      color: #5c4b7d;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background: white;
      margin: 3% auto;
      padding: 20px;
      width: 90%;
      max-width: 900px;
      border-radius: 16px;
      text-align: center;
    }

    .close {
      float: right;
      font-size: 28px;
      cursor: pointer;
    }

    .nav-buttons {
      position: sticky;
      bottom: 0;
      background: white;
      padding: 12px 0;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-between;
    }

    .nav-buttons button {
      padding: 10px 16px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #e6d9f5;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-buttons button:hover {
      background: #d6c6f0;
      transform: translateY(-1px);
    }

    img {
      width: 120px;
      margin-bottom: 10px;
    }

    #greeting {
      color: #7a6c9d;
      font-size: 16px;
      margin-bottom: 10px;
    }

    #searchBox:focus {
      outline: none;
      border-color: #b9a7e6;
      box-shadow: 0 0 5px rgba(180, 150, 255, 0.4);
    }

    #dailyPracticesList {
      text-align: left;
      column-count: 2;
      column-gap: 20px;
      padding-left: 20px;
    }

    #dailyPracticesList li {
      text-align: left;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>

  <div id="header-placeholder"></div>

  <div class="container">

    <img src="cliff-notes-images/daily-practices.png">
    <h1>Daily Practices</h1>
    <div class="subtitle">What is my heart calling me to do right now? ✨</div>

    <input type="text" id="searchBox" placeholder="What am I looking for..."
      style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd;">

    <ul id="dailyPracticesList"></ul>

  </div>

  <script>

    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
      });

    let dailyPracticesData = [];
    let currentIndex = 0;

    fetch('cn-daily-practices.json')
      .then(response => response.json())
      .then(data => {
        dailyPracticesData = data["items"];
        buildList();
      });

    function buildList() {
      const list = document.getElementById("dailyPracticesList");
      list.innerHTML = "";

      firstAidData.forEach((item, index) => {
        const li = document.createElement("li");

        // 👇 store searchable text (label + tags)
        const searchableText = (
          item.label + " " + (item.tags || []).join(" ")
        ).toLowerCase();

        li.setAttribute("data-search", searchableText);

        li.innerHTML = `
          <a href="#" onclick="openModal(${index})">
            ${item.label}
          </a>
       `;
        list.appendChild(li);
      });
    }


    function openModal(index) {
      currentIndex = index;
      showPage();
      document.getElementById("modal").style.display = "block";
    }

    function showPage() {
      const item = dailyPracticesData[currentIndex];

      if (item.type === "PDF") {
        document.getElementById("modal-body").innerHTML =
          `<iframe src="${item.src1}" width="100%" height="600px"></iframe>`;
      }

      else if (item.type === "image") {
        let html = `<img src="${item.src1}" style="max-width:100%; margin-bottom:10px;">`;

        if (item.src2) {
          html += `<img src="${item.src2}" style="max-width:100%;">`;
        }
        document.getElementById("modal-body").innerHTML = html;
      }
      else {
        document.getElementById("modal-body").innerHTML =
          `<p>Oops! Something went wrong loading this resource.</p>`;
      }
    }

    function nextPage() {
      if (currentIndex < dailyPracticesData.length - 1) {
        currentIndex++;
        showPage();
      }
    }

    function prevPage() {
      if (currentIndex > 0) {
        currentIndex--;
        showPage();
      }
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }

  </script>

  <script id="kx8c2t">
    const searchBox = document.getElementById("searchBox");
    const items = document.querySelectorAll("#dailyPracticesList li");

    searchBox.addEventListener("keyup", function () {
      const searchText = searchBox.value.toLowerCase();

      const items = document.querySelectorAll("#dailyPracticesList li");

      items.forEach(function (item) {
        const text = item.textContent.toLowerCase();
        item.style.display = text.includes(searchText) ? "" : "none";
      });
    });

  </script>

  <script src="app.js"></script>

  <div id="modal" class="modal">
    <div class="modal-content">

      <span class="close" onclick="closeModal()">&times;</span>

      <div id="modal-body"></div>

      <div class="nav-buttons">
        <button onclick="prevPage()">⬅️ Previous</button>
        <button onclick="nextPage()">Next ➡️</button>
      </div>

    </div>
  </div>

</body>

</html>
