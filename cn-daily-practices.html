<!DOCTYPE html>

<html>


<head>
  <title>Daily Practices</title>

  <link rel="stylesheet" href="header-styles.css">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f6f3f9;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: 60px auto;
      text-align: center;
      background: white;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      color: #5c4b7d;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #7a6c9d;
      margin-bottom: 30px;
      font-size: 14px;
    }


    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      width: 100%;
      margin: 12px 0;
      padding: 16px;
      /* slightly bigger */
      background: #e6d9f5;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 500;

      cursor: pointer;
      transition: all 0.2s ease;
    }

    .button:hover {
      background: #d6c6f0;
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 20px rgba(180, 150, 255, 0.35);
    }

    .home-button {
      display: inline-block;
      margin-bottom: 20px;
      padding: 12px 20px;
      font-size: 16px;
      background: #dcd0f0;
      border-radius: 10px;
      text-decoration: none;
      color: #5c4b7d;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background: white;
      margin: 3% auto;
      padding: 20px;
      width: 90%;
      max-width: 900px;
      border-radius: 16px;
      text-align: center;
    }

    .close {
      float: right;
      font-size: 28px;
      cursor: pointer;
    }

    .nav-buttons {
      margin-top: 10px;
    }

    .nav-buttons button {
      padding: 10px 16px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: #e6d9f5;
      cursor: pointer;
    }

    img {
      width: 120px;
      margin-bottom: 10px;
    }

    #greeting {
      color: #7a6c9d;
      font-size: 16px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div id="header-placeholder"></div>

  <div class="container">

    <img src="cliff-notes-images/daily-practices.png">
    <h1>Daily Practices</h1>
    <div class="subtitle">What is my heart calling me to do right now? ✨</div>
    <ul>
      <li><a href="#" onclick="openModal(0)">🌬️ Breathing Exercises</a></li>  
      <li><a href="#" onclick="openModal(1)">💛 Centering</a></li>
      <li><a href="#" onclick="openModal(2)">📑 Journaling </a></li>
      <li><a href="#" onclick="openModal(3)">📑 Journaling Quotes </a></li>
      <li><a href="#" onclick="openModal(4)">📑 Self-Reflection Journal Questions </a></li>
      <li><a href="#" onclick="openModal(5)">📑 The Benefits of Writing Down Your Thoughts & Feelings </a></li>
      <li><a href="#" onclick="openModal(6)">🙏🏻 Gratitude Quotes </a></li>
    </ul>

  </div>

  <script>

    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
      });

    const dailyPracticeDocs = [
      "https://drive.google.com/file/d/1gNbTVmWm-XRMVwBQc1w6mlWWKD-qt1TS/preview",    // cn-dp-01-breathing.pdf
      "https://drive.google.com/file/d/1RC_VvT7glEbPhnzwFbcBmRuNJQqZZu4O/preview",    // cn-dp-02-centering.pdf,
      "https://drive.google.com/file/d/106sTmCTXE2z1iEd-_cdH1j9ZoAHiejZy/preview",    // cn-dp-03a-journaling.pdf"
      "https://drive.google.com/file/d/1ajNmlSh7DIfbMH1woA1zutsIlznPei-r/preview",    // cn-dp-03b-journaling-quotes.pdf
      "https://drive.google.com/file/d/1kmQ2ZEaEaRIVBYbqhDE-u-LMgjCHKWr4/preview",    // cn-dp-03c-self-reflection-journal-questions.pdf
      "https://drive.google.com/file/d/19bmKXKxVKhrdtVeaeuv45npS_QNYEebw/preview",    // cn-dp-03d-benefits-of-writing-down-thoughts.pdf
      "https://drive.google.com/file/d/1ytok17dongm9mbV4PCphVKN1KOuiNaoI/preview"     // cn-dp-04a-gratitude.pdf
    ];

    let currentIndex = 0;

    function openModal(index) {
      currentIndex = index;
      showPage();
      document.getElementById("modal").style.display = "block";
    }

    function showPage() {
      const file = dailyPracticeDocs[currentIndex];

      document.getElementById("modal-body").innerHTML =
        `<iframe src="${file}" width="100%" height="600px"></iframe>`;
    }

    function nextPage() {
      if (currentIndex < dailyPracticeDocs.length - 1) {
        currentIndex++;
        showPage();
      }
    }
    function prevPage() {
      if (currentIndex > 0) {
        currentIndex--;
        showPage();
      }
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }


  </script>

  <script src="app.js"></script>

  <div id="modal" class="modal">
    <div class="modal-content">

      <span class="close" onclick="closeModal()">&times;</span>

      <div id="modal-body"></div>

      <div class="nav-buttons">
        <button onclick="prevPage()">⬅️ Previous</button>
        <button onclick="nextPage()">Next ➡️</button>
      </div>

    </div>
  </div>

</body>

</html>
